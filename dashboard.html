<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | The 11+ Weekend League</title>
    <link rel="icon" type="image/png" href="Asset 2.png">
    <style>
        :root {
            --wl-yellow: #ffcb05;
            --wl-soft-yellow: #fff9e6;
            --wl-teal: #16a085;
            --wl-teal-dark: #12826c;
            --wl-soft-teal: #e8f6f3;
            --wl-blue: #0065b3;
            --wl-soft-blue: #e5f0f9;
            
            --wl-black: #1f2227; 
            --wl-text-main: #2c3e50; 
            --wl-text-muted: #64748b;
            --wl-bg-main: #f2f2f2; 
            --wl-white: #ffffff;
            --wl-border: #e2e8f0;

            --wl-nyoro-aqua: #bcedea;
            --wl-nyoro-navy: #15325b;
            --wl-nyoro-pink-text: #ea005e;
            --wl-nyoro-pink-bg: #fce8ef;
            --wl-soft-pink: #fdf2f8;
            
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--wl-bg-main); 
            color: var(--wl-text-main); 
            line-height: 1.6; 
            font-family: var(--font-main); 
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px;
        }

        h1, h2, h3, h4 { font-weight: 800; letter-spacing: -0.5px; color: var(--wl-black); }

        .container { max-width: 1050px; margin: 0 auto; padding: 0 20px; }

        .angled-wrapper { background-color: var(--wl-black); padding: 4px; clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px); margin-bottom: 32px; }
        .angled-inner { background-color: var(--wl-white); padding: 32px; clip-path: polygon(17px 0, 100% 0, 100% calc(100% - 17px), calc(100% - 17px) 100%, 0 100%, 0 17px); height: 100%; }

        .dash-nav { background-color: var(--wl-white); border-bottom: 2px solid var(--wl-border); padding: 16px 0; position: sticky; top: 0; z-index: 50; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { font-weight: 800; font-size: 1.2rem; color: var(--wl-black); display: flex; align-items: center; gap: 12px; }
        .nav-brand img { height: 35px; width: auto; display: block; }
        .nav-links a { color: var(--wl-text-muted); text-decoration: none; font-weight: 600; font-size: 0.95rem; margin-left: 24px; transition: color 0.2s; }
        .nav-links a:hover { color: var(--wl-blue); }

        .btn { padding: 10px 18px; font-weight: 700; font-size: 0.9rem; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; border: none; transition: all 0.2s; font-family: var(--font-main); clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); }
        .btn-square { clip-path: none !important; border-radius: 6px; }
        .btn-primary { background-color: var(--wl-blue); color: var(--wl-white); }
        .btn-primary:hover { background-color: #005299; transform: translateY(-1px); }
        .btn-outline { background-color: transparent; color: var(--wl-blue); border: 2px solid var(--wl-blue); }
        .btn-outline:hover { background-color: var(--wl-soft-blue); }
        .btn-locked { background-color: var(--wl-bg-main); color: var(--wl-text-muted); border: 2px solid #cbd5e1; }
        .btn-locked:hover { background-color: #e2e8f0; color: var(--wl-text-main); }
        .btn-action { background-color: var(--wl-yellow); color: var(--wl-black); border: 2px solid var(--wl-black); }
        .btn-action:hover { background-color: #e6b700; }
        .btn-sm { padding: 8px 16px; font-size: 0.85rem; }

        .header-section { margin: 40px 0 24px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header-section h1 { font-size: 2.4rem; margin-bottom: 4px; }
        .header-section p { font-size: 1.1rem; color: var(--wl-text-muted); font-weight: 600; }
        
        .active-week-card { display: flex; justify-content: space-between; align-items: center; }
        .active-info h2 { font-size: 1.8rem; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .active-info .sub-info { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px;}
