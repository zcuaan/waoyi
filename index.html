<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online 11+ Mock Tests 2026 | Weekend League</title>
    <meta name="description" content="Short online 11+ mock tests every weekend in Summer 2026. Free score after submission, optional cohort rankings, review packs and papers for Bexley, Kent, Sutton and independent school preparation.">
    <style>
        :root {
            /* Dynamic 'League' Palette */
            --poke-yellow: #ffcb05;
            --poke-orange: #f78c1e;
            --poke-teal: #16a085;
            --poke-teal-dark: #12826c;
            --poke-blue: #0065b3;
            --poke-blue-hover: #004b87;
            --poke-black: #1f2227;
            --poke-white: #ffffff;
            --poke-grey: #f2f2f2;
            
            /* Clean System Typography */
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--poke-white);
            color: var(--poke-black);
            line-height: 1.6;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, .font-heavy {
            font-family: var(--font-main);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* --- DYNAMIC ANGLED CORNERS UTILITY --- */
        .angled-wrapper {
            background-color: var(--poke-black);
            padding: 4px; /* Border thickness */
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }
        
        .angled-inner {
            background-color: var(--poke-white);
            height: 100%;
            padding: 30px;
            clip-path: polygon(17px 0, 100% 0, 100% calc(100% - 17px), calc(100% - 17px) 100%, 0 100%, 0 17px);
        }

        .btn-dynamic {
            background-color: var(--poke-blue);
            color: var(--poke-white);
            padding: 14px 28px;
            border: none;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            transition: background-color 0.2s;
        }

        .btn-dynamic:hover {
            background-color: var(--poke-blue-hover);
        }

        /* --- 1. TOP NAVIGATION --- */
        .top-nav {
            background-color: var(--poke-white);
            border-bottom: 2px solid var(--poke-grey);
            padding: 12px 0;
            position: relative;
            z-index: 10;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--poke-black);
        }

        .nav-brand img {
            height: 35px;
            width: auto;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--poke-black);
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--poke-blue);
        }

        /* --- 2. ANNOUNCEMENT BAR --- */
        .announcement-bar {
            background-color: var(--poke-yellow);
            text-align: center;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--poke-black);
        }

        /* --- 3. HERO SECTION --- */
        .hero {
            padding: 70px 0 90px;
            background: linear-gradient(135deg, var(--poke-yellow) 0%, var(--poke-orange) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text {
            text-align: center;
        }

        .hero-logo-large {
            max-width: 100%;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.1));
        }

        .hero-headline {
            font-size: 2.2rem;
            color: var(--poke-black);
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .hero-text .subheading {
            font-size: 1.15rem;
            color: var(--poke-black);
            font-weight: 600;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .hero-bullets {
            list-style: none;
            text-align: left;
            background-color: var(--poke-white);
            padding: 24px;
            border: var(--stroke-thick);
            border-radius: 8px;
            box-shadow: var(--shadow-hard);
            display: inline-block;
        }

        .hero-bullets li {
            margin-bottom: 12px;
            font-size: 1.05rem;
            color: var(--poke-black);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-weight: 600;
        }

        .hero-bullets li:last-child {
            margin-bottom: 0;
        }

        .hero-bullets li::before {
            content: "⚡";
            font-size: 1.2rem;
        }

        /* --- REGISTRATION CARD --- */
        .registration-card h2 {
            font-size: 1.5rem;
            color: var(--poke-black);
            margin-bottom: 24px;
            text-align: center;
            border-bottom: 3px solid var(--poke-grey);
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-family: var(--font-main);
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--poke-black);
        }

        /* Proper squares for inputs, no clip-path here */
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--poke-black);
            border-radius: 4px;
            font-size: 1rem;
            background-color: var(--poke-white);
            color: var(--poke-black);
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            background-color: var(--poke-yellow);
        }

        .dob-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .helper-text {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-top: 8px;
            font-weight: 500;
        }

        /* Proper squares for consent box */
        .consent-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 24px 0;
            background-color: var(--poke-grey);
            padding: 16px;
            border-radius: 4px;
        }

        .consent-group input[type="checkbox"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            accent-color: var(--poke-blue);
        }

        .consent-group label {
            font-size: 0.85rem;
            line-height: 1.4;
            color: var(--poke-black);
            font-weight: 600;
        }
        
        .hook-text {
            text-align: center;
            font-weight: 800;
            color: var(--poke-blue);
            margin-bottom: 16px;
            font-size: 1.05rem;
        }

        .btn-submit {
            width: 100%;
            font-size: 1.2rem;
            padding: 16px;
        }

        /* --- SECTION HEADERS --- */
        .section-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .section-header h2 {
            font-size: 2.2rem;
            color: var(--poke-white);
            text-shadow: 2px 2px 0px var(--poke-black);
        }

        .section-header.dark h2 {
            color: var(--poke-black);
            text-shadow: 2px 2px 0px var(--poke-yellow);
        }

        /* --- 3.5 SEO INTRO --- */
        .seo-intro {
            padding: 50px 0;
            background-color: var(--poke-white);
            text-align: center;
            border-bottom: 2px solid var(--poke-grey);
        }

        .seo-intro p {
            font-size: 1.15rem;
            color: #444;
            font-weight: 500;
            line-height: 1.8;
            max-width: 850px;
            margin: 0 auto;
        }

        /* --- 4. HOW IT WORKS (TEAL BACKGROUND) --- */
        .how-it-works {
            padding: 80px 0;
            background: linear-gradient(135deg, var(--poke-teal) 0%, var(--poke-teal-dark) 100%);
        }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .step-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 16px;
        }

        .step-marker {
            width: 50px;
            height: 50px;
            background-color: var(--poke-yellow);
            color: var(--poke-black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.5rem;
            clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
        }

        .step-inner h3 {
            font-size: 1.25rem;
            color: var(--poke-black);
        }

        .step-inner p {
            font-weight: 500;
            color: #333;
        }

        /* --- 5. WEEKEND SCHEDULE (WHITE) --- */
        .schedule {
            padding: 80px 0;
            background-color: var(--poke-white);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .schedule-cell {
            text-align: center;
        }

        .schedule-cell .icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .schedule-cell strong {
            display: block;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--poke-blue);
            margin-bottom: 8px;
        }

        .schedule-cell span {
            font-size: 1.2rem;
            color: var(--poke-black);
            font-weight: 800;
        }

        .schedule-footer {
            margin-top: 40px;
            text-align: center;
            font-size: 1.1rem;
            color: var(--poke-black);
            font-weight: 700;
            background-color: var(--poke-yellow);
            padding: 15px;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- 5.5 SUMMER TABLE SCHEDULE --- */
        .summer-schedule {
            padding: 80px 0;
            background-color: var(--poke-grey);
            border-top: 2px solid var(--poke-black);
            border-bottom: 2px solid var(--poke-black);
        }
        
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.05rem;
            background-color: var(--poke-white);
        }

        .schedule-table th, .schedule-table td {
            padding: 16px;
            text-align: left;
            color: var(--poke-black);
        }

        .schedule-table th {
            background-color: var(--poke-yellow);
            font-family: var(--font-main);
            font-weight: 800;
            border-bottom: 3px solid var(--poke-black);
        }

        .schedule-table td {
            border-bottom: 2px solid var(--poke-grey);
            font-weight: 600;
        }

        .schedule-table tr:last-child td {
            border-bottom: none;
        }
        
        .table-responsive {
            overflow-x: auto;
            width: 100%;
        }

        /* --- 6. SAMPLE REPORT PREVIEW (TEAL) --- */
        .report-preview {
            padding: 80px 0;
            background: linear-gradient(135deg, var(--poke-teal) 0%, var(--poke-teal-dark) 100%);
        }

        .dashboard-ui {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .dash-inner {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .dash-inner h4 {
            font-size: 1.2rem;
            color: var(--poke-blue);
            margin-bottom: 12px;
            border-bottom: 3px solid var(--poke-grey);
            padding-bottom: 10px;
        }

        .dash-league-title {
            font-weight: 700;
            color: #555;
            margin-bottom: 20px;
            font-size: 0.95rem;
            border-bottom: 2px solid var(--poke-black);
            padding-bottom: 12px;
        }

        .dash-metric {
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dash-metric span {
            font-weight: 700;
            font-size: 0.95rem;
            color: #555;
        }

        .dash-metric strong {
            font-size: 1.2rem;
            color: var(--poke-black);
            font-weight: 800;
        }
        
        .dash-metric strong.highlight {
            color: var(--poke-blue);
        }

        .tag-list {
            list-style: none;
            margin-bottom: 20px;
